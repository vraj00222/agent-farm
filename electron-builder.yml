appId: com.agentfarm.desktop
productName: Agent Farm
copyright: Copyright © 2026 Agent Farm
directories:
  output: release
  buildResources: build
files:
  - 'out/**/*'
  - 'package.json'
asar: true
mac:
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
        - x64
  hardenedRuntime: true
  gatekeeperAssess: false
  # NOTE: unsigned for now. To sign + notarize:
  #   1. set CSC_LINK / CSC_KEY_PASSWORD env vars (Apple Developer ID cert)
  #   2. set APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD / APPLE_TEAM_ID for notarization
  identity: null
dmg:
  title: 'Agent Farm ${version}'
  background: null
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications
publish: null
